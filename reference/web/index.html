<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>posh-wasm WebView2 render spike</title>
  </head>
  <body>
    <div id="status">loading…</div>
    <script type="module" src="/src/quill-bridge.js"></script>
    <script type="module">
      // Mark ready for the driver to detect.
      const tick = setInterval(() => {
        if (window.__bridgeReady) {
          clearInterval(tick);
          document.getElementById("status").textContent = "bridge-ready";
        }
      }, 50);
    </script>
  </body>
</html>
